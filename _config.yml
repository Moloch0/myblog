locale: "zh-CN"
title: "罗力恒的博客"
title_separator: "|"
subtitle: "记录学习、项目与思考"
name: "罗力恒"
description: "个人学习记录、技术笔记与项目日志"
url: "https://moloch0.github.io"
baseurl: "/myblog"
repository: "Moloch0/myblog"

timezone: Asia/Shanghai

remote_theme: "mmistakes/minimal-mistakes@4.27.3"
minimal_mistakes_skin: "air"

search: true
breadcrumbs: true
read_more: "enabled"
words_per_minute: 250

paginate: 8
paginate_path: /page:num/

permalink: /:categories/:title/
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-include-cache

author:
  name: "罗力恒"
  bio: "这里记录长期学习与实践。"
  location: "China"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Moloch0"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      comments: false
      share: false
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false

include:
  - _pages

exclude:
  - README.md
  - LICENSE.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
