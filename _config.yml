locale: "en-US"
title: "Liheng Luo Blog"
title_separator: "|"
subtitle: "Research Notes, Projects, and Long-form Learning"
name: "Liheng Luo"
description: "Personal research notes, technical writing, and project logs."
url: "https://moloch0.github.io"
baseurl: "/myblog"
repository: "Moloch0/myblog"

timezone: Asia/Shanghai

remote_theme: "mmistakes/minimal-mistakes@4.27.3"
minimal_mistakes_skin: "default"

search: true
breadcrumbs: true
read_more: "enabled"
words_per_minute: 250

paginate: 8
paginate_path: /page:num/

permalink: /:categories/:title/
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-include-cache

author:
  name: "Liheng Luo"
  bio: "A lab-style notebook for ideas, experiments, and technical summaries."
  location: "China"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Moloch0"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      comments: false
      share: false
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false

include:
  - _pages

exclude:
  - README.md
  - LICENSE.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
